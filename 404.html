<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Page not found — Arun Teja Kamisetti</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
:root{--cream:#F7F0E6;--ink:#241B14;--ink-soft:#6B5D4F;--peach:#FF6A2B;--line:#E6DAC8;--paper:#FFFDF9;}
@media (prefers-color-scheme: dark){:root{--cream:#15110D;--ink:#F4ECE0;--ink-soft:#C3B4A2;--paper:#221c16;--line:rgba(255,255,255,.12);}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:520px;}
.chip{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#fff;background:var(--ink);padding:4px 12px;border-radius:8px;letter-spacing:1px;box-shadow:3px 3px 0 var(--peach);display:inline-block;margin-bottom:20px;}
h1{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(72px,18vw,140px);line-height:1;letter-spacing:-.04em;color:var(--peach);}
h2{font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(20px,4vw,28px);margin:8px 0 14px;}
p{color:var(--ink-soft);font-size:16px;margin-bottom:28px;}
a.btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:15px;padding:14px 26px;border-radius:100px;border:2px solid var(--ink);background:var(--ink);color:var(--cream);text-decoration:none;transition:all .2s;}
a.btn:hover{background:var(--peach);border-color:var(--peach);color:#fff;transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.kai{margin:0 auto 18px;width:80px;height:80px;}
.kai svg{width:100%;height:100%;animation:bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="kai" aria-hidden="true">
    <svg viewBox="0 0 104 104">
      <ellipse cx="52" cy="92" rx="18" ry="3.5" fill="#241B14" opacity="0.12"/>
      <path d="M34 40 L28 20 Q40 29 47 36 Z" fill="#7A5CFF"/><path d="M70 40 L76 20 Q64 29 57 36 Z" fill="#7A5CFF"/>
      <circle cx="52" cy="48" r="24" fill="#7A5CFF"/>
      <ellipse cx="44" cy="48" rx="5" ry="6" fill="#fff"/><ellipse cx="60" cy="48" rx="5" ry="6" fill="#fff"/>
      <circle cx="44" cy="49" r="2.6" fill="#1a1430"/><circle cx="60" cy="49" r="2.6" fill="#1a1430"/>
      <path d="M47 57 Q52 53 57 57" stroke="#1a1430" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="37" cy="55" r="3" fill="#FF6A2B" opacity="0.45"/><circle cx="67" cy="55" r="3" fill="#FF6A2B" opacity="0.45"/>
    </svg>
  </div>
  <span class="chip">&lt;/&gt; 404</span>
  <h1>404</h1>
  <h2>Kai couldn't find that page</h2>
  <p>The link may be broken or the page moved. Let's get you back.</p>
  <a class="btn" href="/">← Back to home</a>
</div>
</body>
</html>
