<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <title>Reading — Arun Teja Kamisetti</title>
  <meta name="description" content="A thought by Arun Teja Kamisetti." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='26' fill='%23FF6A2B'/%3E%3Ctext x='50' y='71' font-size='58' font-family='Arial' font-weight='bold' fill='%23fff' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .reader{max-width:760px;margin:0 auto;padding:120px 22px 100px;}
    .reader__back{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ink);text-decoration:none;border:2px solid var(--ink);border-radius:var(--radius-pill);padding:8px 16px;margin-bottom:34px;transition:transform .2s var(--ease),background .2s var(--ease);}
    .reader__back:hover{transform:translateX(-3px);background:var(--peach);color:#fff;border-color:var(--peach);}
    .reader__meta{display:flex;gap:14px;flex-wrap:wrap;font-family:'Space Mono',monospace;font-size:12.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
    .post-body h1{font-family:var(--font-display);font-weight:800;font-size:clamp(30px,5vw,46px);line-height:1.1;letter-spacing:-.01em;margin:0 0 22px;}
    .post-body h2{font-family:var(--font-display);font-weight:700;font-size:26px;margin:42px 0 14px;}
    .post-body h3{font-family:var(--font-display);font-weight:700;font-size:20px;margin:32px 0 10px;}
    .post-body p{font-size:18px;line-height:1.75;margin:0 0 22px;color:var(--ink-soft,var(--ink));}
    .post-body ul,.post-body ol{font-size:18px;line-height:1.75;margin:0 0 22px;padding-left:26px;}
    .post-body li{margin-bottom:8px;}
    .post-body a{color:var(--peach);text-decoration:underline;text-underline-offset:3px;}
    .post-body strong{font-weight:700;}
    .post-body em{font-style:italic;}
    .post-body blockquote{border-left:4px solid var(--peach);background:var(--cream-2);margin:26px 0;padding:14px 20px;border-radius:0 12px 12px 0;font-style:italic;}
    .post-body code{font-family:'Space Mono',monospace;font-size:.88em;background:var(--cream-2);padding:2px 6px;border-radius:6px;}
    .post-body pre{background:var(--ink);color:var(--cream);padding:18px 20px;border-radius:14px;overflow:auto;margin:0 0 24px;}
    .post-body pre code{background:none;padding:0;color:inherit;}
    .post-body hr{border:none;border-top:2px solid var(--line);margin:38px 0;}
    .post-body img{max-width:100%;border-radius:14px;border:2px solid var(--ink);margin:8px 0 24px;}
    .reader__err{font-size:17px;color:var(--ink-faint);}
    .reader__topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line);}
    .reader__topbar-in{max-width:760px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;}
    .reader__brand{font-family:var(--font-display);font-weight:800;font-size:17px;color:var(--ink);text-decoration:none;}
    .reader__brand b{color:var(--peach);}
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header class="reader__topbar">
    <div class="reader__topbar-in">
      <a class="reader__brand" href="index.html">Arun<b>.</b></a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24"><path id="theme-icon-path" fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-8.54-8.54C12.92 3.04 12.46 3 12 3z"/></svg>
      </button>
    </div>
  </header>

  <main class="reader">
    <a class="reader__back" href="index.html#thoughts">&larr; Back to all thoughts</a>
    <div class="reader__meta" id="post-meta"></div>
    <article class="post-body" id="post-body"><p class="reader__err">Loading…</p></article>
  </main>

  <script>
  (function(){
    "use strict";
    // ---- theme (mirror of index.html behavior) ----
    var root=document.documentElement;
    var saved=null; try{saved=window.__theme;}catch(e){}
    function applyTheme(t){ root.setAttribute("data-theme",t); var p=document.getElementById("theme-icon-path"); if(p){ p.setAttribute("d", t==="dark" ? "M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-8.54-8.54C12.92 3.04 12.46 3 12 3z" : "M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"); } }
    var cur="light";
    applyTheme(cur);
    var tg=document.getElementById("theme-toggle");
    if(tg) tg.addEventListener("click",function(){ cur=cur==="light"?"dark":"light"; applyTheme(cur); });

    // ---- minimal, safe markdown -> html ----
    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function inline(s){
      s=esc(s);
      s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
      s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
      s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,'<img alt="$1" src="$2"/>');
      s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,function(m,t,u){
        var safe=/^(https?:|mailto:|\/|#|assets\/)/.test(u);
        return safe ? '<a href="'+u+'" '+(/^https?:/.test(u)?'target="_blank" rel="noopener"':'')+'>'+t+'</a>' : t;
      });
      return s;
    }
    function mdToHtml(md){
      var lines=md.replace(/\r\n/g,"\n").split("\n");
      var html=[], i=0, inCode=false, codeBuf=[];
      function flushList(buf,ordered){ if(!buf.length)return ""; var tag=ordered?"ol":"ul"; return "<"+tag+">"+buf.map(function(x){return "<li>"+inline(x)+"</li>";}).join("")+"</"+tag+">"; }
      var listBuf=[], listOrdered=false;
      function closeList(){ if(listBuf.length){ html.push(flushList(listBuf,listOrdered)); listBuf=[]; } }
      for(i=0;i<lines.length;i++){
        var ln=lines[i];
        if(/^```/.test(ln)){ if(inCode){ html.push("<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>"); codeBuf=[]; inCode=false; } else { closeList(); inCode=true; } continue; }
        if(inCode){ codeBuf.push(ln); continue; }
        if(/^\s*$/.test(ln)){ closeList(); continue; }
        var h=ln.match(/^(#{1,3})\s+(.*)$/);
        if(h){ closeList(); html.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">"); continue; }
        if(/^>\s?/.test(ln)){ closeList(); html.push("<blockquote>"+inline(ln.replace(/^>\s?/,""))+"</blockquote>"); continue; }
        if(/^---+\s*$/.test(ln)){ closeList(); html.push("<hr/>"); continue; }
        var ol=ln.match(/^\s*\d+\.\s+(.*)$/);
        var ul=ln.match(/^\s*[-*]\s+(.*)$/);
        if(ol){ if(!listOrdered)closeList(); listOrdered=true; listBuf.push(ol[1]); continue; }
        if(ul){ if(listOrdered)closeList(); listOrdered=false; listBuf.push(ul[1]); continue; }
        closeList();
        html.push("<p>"+inline(ln)+"</p>");
      }
      closeList();
      if(inCode){ html.push("<pre><code>"+esc(codeBuf.join("\n"))+"</code></pre>"); }
      return html.join("\n");
    }

    function qs(k){ var m=new RegExp("[?&]"+k+"=([^&]+)").exec(location.search); return m?decodeURIComponent(m[1]):""; }
    var slug=qs("p").replace(/[^a-zA-Z0-9\-_]/g,""); // sanitize: filename only
    var body=document.getElementById("post-body");
    var metaEl=document.getElementById("post-meta");
    if(!slug){ body.innerHTML='<p class="reader__err">No post specified.</p>'; return; }

    fetch("assets/thoughts/"+slug+".md",{cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("not found"); return r.text(); })
      .then(function(text){
        // optional frontmatter: ---\ntitle: ..\ndate: ..\nreadTime: ..\n---
        var fm={}; var m=text.match(/^---\n([\s\S]*?)\n---\n?/);
        if(m){ m[1].split("\n").forEach(function(l){ var p=l.indexOf(":"); if(p>0) fm[l.slice(0,p).trim()]=l.slice(p+1).trim(); }); text=text.slice(m[0].length); }
        var bits=[];
        if(fm.date){ var d=new Date(fm.date); bits.push(isNaN(d)?fm.date:d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})); }
        if(fm.readTime) bits.push(fm.readTime);
        metaEl.innerHTML=bits.map(function(b){return "<span>"+esc(b)+"</span>";}).join("");
        if(fm.title) document.title=fm.title+" — Arun Teja Kamisetti";
        // if md doesn't start with a heading and we have a title, prepend it
        var rendered=mdToHtml(text);
        if(fm.title && !/^<h1/.test(rendered)) rendered="<h1>"+esc(fm.title)+"</h1>"+rendered;
        body.innerHTML=rendered;
      })
      .catch(function(){
        body.innerHTML='<p class="reader__err">This post isn’t available yet. <a href="index.html#thoughts" style="color:var(--peach)">Go back to thoughts</a>.</p>';
      });
  })();
  </script>
</body>
</html>
